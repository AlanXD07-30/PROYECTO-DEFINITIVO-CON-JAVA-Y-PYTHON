<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión - Ing Aya</title>

  <link rel="stylesheet" href="login.css">
  <link rel="icon" href="../logo_INGAYA_gris-sin fondo.png">

  <style>
    /* Mensajes y spinner mínimos (puedes mover a login.css) */
    #mensaje-servidor { text-align:center; font-weight:700; margin-top:12px; display:none; }
    #mensaje-servidor.success { color: green; display:block; }
    #mensaje-servidor.error { color: red; display:block; }
    .spinner {
      display:inline-block;
      width:16px;
      height:16px;
      border:2px solid rgba(0,0,0,0.1);
      border-left-color:#fff;
      border-radius:50%;
      animation: spin .8s linear infinite;
      vertical-align:middle;
      margin-left:8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button[disabled] { opacity: 0.6; cursor: not-allowed; }
    /* Pequeños ajustes para accesibilidad */
    input:invalid { outline: 2px solid #f44336; }
    input:focus { outline: 2px solid #2196F3; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
  </style>
</head>

<body>

  <header class="header-login">
    <a href="#" class="logo-head" aria-label="Inicio">
      <img src="../logo_INGAYA_gris-sin fondo.png" alt="Logo ING AYA" width="120">
      <h2 class="nom_emp" aria-hidden="true"></h2>
    </a>

    <a href="../PAGINA PRINCIPAL INMUEBLES ING AYA/Index.html" class="volver-inicio">
      Volver a inicio
    </a>
  </header>

  <main class="login-container" role="main" aria-labelledby="titulo-login">

    <!-- action apunta al endpoint que configuramos en SecurityConfig (/perform_login) -->
    <form id="form-login" action="http://localhost:8080/perform_login" method="POST" novalidate>
      
      <h2 id="titulo-login">Inicia Sesión</h2>
      
      <label for="email" class="sr-only">Correo electrónico</label>
      <input 
        type="email" 
        name="email" 
        id="email"
        placeholder="Correo electrónico" 
        required 
        autocomplete="username"
        aria-required="true"
      />

      <label for="password" class="sr-only">Contraseña</label>
      <input 
        type="password" 
        name="password" 
        id="password"
        placeholder="Contraseña" 
        required 
        autocomplete="current-password"
        aria-required="true"
      />
      
      <button type="submit" id="btn-login" aria-live="polite">Iniciar Sesión</button>

      <div id="mensaje-servidor" role="status" aria-live="polite"></div>
      
      <div class="registro" aria-hidden="false">
        <br>
        <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
        <p>¿Has olvidado tu contraseña? 
          <a href="../RECUPERAR CONTRASEÑA/Rec.html">Recupérala</a>
        </p>
      </div>

    </form>

  </main>

  <footer class="footer-login">
    <img src="../logo_INGAYA_gris-sin fondo.png" alt="Logo pequeño" width="80">
    <p>Todos los derechos reservados</p>
  </footer>

<script>
(function() {
  const form = document.getElementById('form-login');
  const btn = document.getElementById('btn-login');
  const mensaje = document.getElementById('mensaje-servidor');

  function showMessage(text, success) {
    mensaje.className = success ? 'success' : 'error';
    mensaje.textContent = text;
    mensaje.style.display = 'block';
  }

  function clearMessage() {
    mensaje.style.display = 'none';
    mensaje.textContent = '';
    mensaje.className = '';
  }

  function setLoading(loading) {
    if (loading) {
      btn.disabled = true;
      if (!document.getElementById('spinner')) {
        const sp = document.createElement('span');
        sp.id = 'spinner';
        sp.className = 'spinner';
        btn.appendChild(sp);
      }
    } else {
      btn.disabled = false;
      const sp = document.getElementById('spinner');
      if (sp) sp.remove();
    }
  }

  // Intenta obtener token CSRF desde meta tag o cookie XSRF-TOKEN
  function getCsrfToken() {
    // 1) meta tag (server-side rendering)
    const meta = document.querySelector('meta[name="_csrf"]');
    if (meta && meta.content) return { headerName: 'X-CSRF-TOKEN', token: meta.content };

    // 2) cookie (common pattern: XSRF-TOKEN or X-XSRF-TOKEN)
    const cookie = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('XSRF-TOKEN=') || c.startsWith('X-XSRF-TOKEN='));
    if (cookie) {
      const value = decodeURIComponent(cookie.split('=')[1]);
      // Spring commonly expects header 'X-XSRF-TOKEN' or 'X-CSRF-TOKEN'
      return { headerName: 'X-XSRF-TOKEN', token: value };
    }

    // 3) no token found
    return null;
  }

  // Determina si la petición es same-origin con el backend
  function isSameOrigin(url) {
    try {
      const target = new URL(url, window.location.href);
      return target.origin === window.location.origin;
    } catch (e) {
      return false;
    }
  }

  // Si el backend está en otro origen, fetch debe usar credentials: 'include'
  async function submitWithFetch(actionUrl, formData) {
    const csrf = getCsrfToken();
    const headers = {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Accept': 'application/json',
      'X-Requested-With': 'XMLHttpRequest'
    };
    if (csrf && csrf.headerName && csrf.token) {
      headers[csrf.headerName] = csrf.token;
    }

    // Convertimos FormData a URLSearchParams para application/x-www-form-urlencoded
    const body = new URLSearchParams();
    for (const pair of formData.entries()) {
      body.append(pair[0], pair[1]);
    }

    try {
      const response = await fetch(actionUrl, {
        method: 'POST',
        headers,
        body: body.toString(),
        credentials: 'include',
        redirect: 'manual'
      });

      // Manejo de redirecciones: preferimos Location header si está disponible
      if (response.status === 302 || response.status === 301 || response.status === 303 || response.status === 307) {
        const location = response.headers.get('Location');
        if (location) {
          const target = new URL(location, actionUrl);
          window.location.href = target.href;
          return;
        }
      }

      // Algunos backends devuelven JSON con { redirect: '...' }
      const contentType = response.headers.get('Content-Type') || '';
      if (contentType.includes('application/json')) {
        const json = await response.json();
        if (json.redirect) {
          window.location.href = json.redirect;
          return;
        }
        // show message if provided
        if (json.message) {
          if (response.ok) showMessage(json.message, true);
          else showMessage(json.message, false);
        } else {
          if (response.ok) showMessage('Inicio de sesión correcto.', true);
          else showMessage(`Error ${response.status}: ${response.statusText}`, false);
        }
        setLoading(false);
        return;
      }

      // Si no es JSON, tratamos como texto/HTML
      const payloadText = await response.text();

      if (response.ok) {
        showMessage(payloadText || 'Inicio de sesión correcto.', true);
        // Si no hay redirección, espera 700ms y redirige a /home por defecto
        setTimeout(() => {
          window.location.href = 'http://localhost:8080/home';
        }, 700);
      } else {
        showMessage(payloadText || `Error ${response.status}: ${response.statusText}`, false);
      }
    } catch (err) {
      console.error('Error en login (fetch):', err);
      showMessage('Error de conexión con el servidor. Intenta más tarde.', false);
    } finally {
      setLoading(false);
    }
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault(); // manejamos con JS para controlar mensajes y redirecciones

    clearMessage();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showMessage('Por favor completa correo y contraseña.', false);
      return;
    }

    const fd = new FormData();
    fd.append('email', email);
    fd.append('password', password);

    setLoading(true);
    showMessage('Iniciando sesión...', true);

    const actionUrl = form.action;

    // Si el formulario está en el mismo origen que el backend, hacemos submit normal
    // para que el navegador maneje cookies y redirecciones automáticamente.
    if (isSameOrigin(actionUrl)) {
      // Insertar token CSRF en un input hidden si existe
      const csrf = getCsrfToken();
      if (csrf && csrf.token) {
        let input = form.querySelector('input[name="_csrf"]');
        if (!input) {
          input = document.createElement('input');
          input.type = 'hidden';
          input.name = '_csrf';
          form.appendChild(input);
        }
        input.value = csrf.token;
      }

      // Hacemos submit normal (no fetch) para permitir redirección y cookies
      form.submit();
      return;
    }

    // Si es cross-origin, usamos fetch con credentials: 'include'
    await submitWithFetch(actionUrl, fd);
  });
})();
</script>

</body>
</html>
