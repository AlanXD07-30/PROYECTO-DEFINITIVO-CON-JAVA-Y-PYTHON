<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión - Ing Aya</title>

  <link rel="stylesheet" href="login.css">
  <link rel="icon" href="../logo_INGAYA_gris-sin fondo.png">
  <style>
    /* Mensajes y spinner mínimos (puedes mover a login.css) */
    #mensaje-servidor { text-align:center; font-weight:700; margin-top:12px; display:none; }
    #mensaje-servidor.success { color: green; display:block; }
    #mensaje-servidor.error { color: red; display:block; }
    .spinner {
      display:inline-block;
      width:16px;
      height:16px;
      border:2px solid rgba(0,0,0,0.1);
      border-left-color:#fff;
      border-radius:50%;
      animation: spin .8s linear infinite;
      vertical-align:middle;
      margin-left:8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button[disabled] { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>

<body>

  <header class="header-login">
    <a href="#" class="logo-head">
      <img src="../logo_INGAYA_gris-sin fondo.png" alt="Logo ING AYA">
      <h2 class="nom_emp"></h2>
    </a>

    <a href="../PAGINA PRINCIPAL INMUEBLES ING AYA/Index.html" class="volver-inicio">
      Volver a inicio
    </a>
  </header>

  <main class="login-container">

    <form id="form-login" action="http://localhost:8080/login" method="POST" novalidate>
      
      <h2>Inicia Sesión</h2>
      
      <input 
        type="email" 
        name="email" 
        id="email"
        placeholder="Correo electrónico" 
        required 
      />

      <input 
        type="password" 
        name="password" 
        id="password"
        placeholder="Contraseña" 
        required 
      />
      
      <button type="submit" id="btn-login">Iniciar Sesión</button>

      <div id="mensaje-servidor" role="status" aria-live="polite"></div>
      
      <div class="registro">
        <br>
        <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
        <p>¿Has olvidado tu contraseña? 
          <a href="../RECUPERAR CONTRASEÑA/Rec.html">Recupérala</a>
        </p>
      </div>

    </form>

  </main>

  <footer class="footer-login">
    <img src="../logo_INGAYA_gris-sin fondo.png" alt="Logo pequeño">
    <p>Todos los derechos reservados</p>
  </footer>

<script>
(function() {
  const form = document.getElementById('form-login');
  const btn = document.getElementById('btn-login');
  const mensaje = document.getElementById('mensaje-servidor');

  function showMessage(text, success) {
    mensaje.className = success ? 'success' : 'error';
    mensaje.textContent = text;
    mensaje.style.display = 'block';
  }

  function clearMessage() {
    mensaje.style.display = 'none';
    mensaje.textContent = '';
    mensaje.className = '';
  }

  function setLoading(loading) {
    if (loading) {
      btn.disabled = true;
      if (!document.getElementById('spinner')) {
        const sp = document.createElement('span');
        sp.id = 'spinner';
        sp.className = 'spinner';
        btn.appendChild(sp);
      }
    } else {
      btn.disabled = false;
      const sp = document.getElementById('spinner');
      if (sp) sp.remove();
    }
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault(); // manejamos con fetch para controlar mensajes y redirecciones

    clearMessage();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showMessage('Por favor completa correo y contraseña.', false);
      return;
    }

    const fd = new FormData();
    fd.append('email', email);
    fd.append('password', password);

    setLoading(true);
    showMessage('Iniciando sesión...', true);

    try {
      // redirect: 'manual' para capturar Location en respuestas 302
      const response = await fetch(form.action, {
        method: 'POST',
        body: fd,
        redirect: 'manual'
      });

      // Si el servidor responde con redirect (302/301) y Location, redirigimos el navegador
      if (response.status === 302 || response.status === 301) {
        const location = response.headers.get('Location');
        if (location) {
          window.location.href = location;
          return;
        }
      }

      // Si el servidor devuelve 200/4xx/5xx con cuerpo
      const text = await response.text();

      if (response.ok) {
        showMessage(text || 'Inicio de sesión correcto.', true);
      } else {
        // Mostrar mensaje de error devuelto por el servidor o genérico
        showMessage(text || `Error ${response.status}: ${response.statusText}`, false);
      }
    } catch (err) {
      console.error('Error en login:', err);
      showMessage('Error de conexión con el servidor. Intenta más tarde.', false);
    } finally {
      setLoading(false);
    }
  });
})();
</script>

</body>
</html>
