# -------------------------
# Datasource (PostgreSQL)
# -------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/ingaya
spring.datasource.username=postgres
spring.datasource.password=123456789
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------
# JPA / Hibernate
# -------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Muestra valores enlazados en logs (útil para depuración de inserts)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# -------------------------
# Thymeleaf / recursos estáticos
# -------------------------
spring.thymeleaf.cache=false
spring.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/

# -------------------------
# Server
# -------------------------
server.port=8080
server.servlet.context-path=/

# -------------------------
# Seguridad (opcional)
# -------------------------
# Si usas Spring Security y quieres permitir CORS desde el frontend local:
# (también puedes configurar CorsConfig.java)
#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

# -------------------------
# Perfil y logging general
# -------------------------
spring.profiles.active=dev
logging.level.root=INFO
logging.level.com.example.demo=DEBUG

